      rel="preload"
      href="/font/Gilroy-Regular.woff2"
      as="font"
      type="font/woff2"

    <link

      as="font"
      type="font/woff2"

    />

      property="og:title"
      content="Teamocracy — нова культура командної взаємодії"

      property="og:description"
      content="Teamocracy — це нова культура командної взаємодії. Принципи, що дозволяють краще співпрацювати командам."

      name="twitter:title"
      content="Teamocracy — нова культура командної взаємодії"

    <!-- Google Analytics 4 -->
    <!-- Replace G-XXXXXXXXXX with your GA4 Measurement ID -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      // Skip tracking on localhost/dev
      if (
        location.hostname !== "localhost" &&
        location.hostname !== "127.0.0.1"
      ) {
        gtag("js", new Date());
        gtag("config", "G-XXXXXXXXXX", { anonymize_ip: true });
      }
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
